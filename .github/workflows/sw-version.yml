name: Bump SW Cache Version

# master에 push될 때마다 자동으로 sw.js의 DEPLOY 버전을 갱신합니다.
on:
  push:
    branches: [ master ]

jobs:
  bump-sw-version:
    # 이 워크플로우가 만든 커밋("[skip ci]")은 재실행하지 않음 → 무한 루프 방지
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject commit SHA into sw.js
        run: |
          VERSION="${GITHUB_SHA::8}"
          sed -i "s/const DEPLOY = '[^']*';/const DEPLOY = '${VERSION}';/" docs/sw.js
          echo "SW cache version bumped → ${VERSION}"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/sw.js
          if ! git diff --staged --quiet; then
            git commit -m "chore: bump SW cache version [skip ci]"
            git push
          else
            echo "sw.js unchanged, skipping commit"
          fi
